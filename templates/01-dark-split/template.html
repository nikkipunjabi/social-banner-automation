<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0a1e;--bg2:#160c30;--bg3:#1c1245;
  --accent:#6e35c5;--accent2:#9b59f5;
  --text:#fff;--muted:#c4b8e8;--sep:rgba(255,255,255,.22)
}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text)}

.wrap{width:100vw;height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* geometric corner fills */
.geo-tl{position:absolute;top:0;left:0;width:0;height:0;
  border-top:38vh solid var(--bg2);border-right:28vw solid transparent;z-index:0}
.geo-br{position:absolute;bottom:0;right:0;width:0;height:0;
  border-bottom:42vh solid var(--bg3);border-left:35vw solid transparent;z-index:0}

/* main two-column area */
.main{position:relative;z-index:1;flex:1;display:flex;flex-direction:row;
  padding:3.5vh 4.5vw 1.5vh;gap:3vw;min-height:0}

.left{flex:1.4;display:flex;flex-direction:column;justify-content:flex-start;gap:1.8vh;min-width:0}

.right{flex:0.75;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:.5vh}

/* pills */
.pill{display:inline-flex;align-items:center;background:var(--accent);
  font-size:1.3vw;font-weight:600;padding:.4vw 1.4vw;border-radius:100px;white-space:nowrap;width:fit-content}
.pill-outline{display:inline-flex;align-items:center;
  background:rgba(110,53,197,.28);border:1.5px solid var(--accent2);
  font-size:1.1vw;font-weight:600;padding:.35vw 1.2vw;border-radius:100px;white-space:nowrap;width:fit-content}

.title{font-size:4vw;font-weight:800;line-height:1.15;letter-spacing:-.02em;margin-top:.5vh}
.divider{width:5vw;height:2px;background:rgba(255,255,255,.45);margin:.2vh 0}

/* speaker photo */
.photo-box{width:100%;max-width:21vw}
.photo-box img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;border-radius:1.2vw;display:block}
.spk-name{font-size:1.7vw;font-weight:700;text-align:center;margin-top:1.2vh}
.spk-role{font-size:1.05vw;color:var(--muted);text-align:center;margin-top:.3vh}

/* date card */
.date-wrap{position:relative;z-index:1;margin:0 4.5vw 1vh}
.date-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:.9vw;padding:1.4vh 2vw;display:flex;align-items:center;justify-content:center}
.dc{flex:1;text-align:center;padding:0 1.5vw}
.dc-sep{width:1px;height:4vh;background:var(--sep);flex-shrink:0}
.dc .lbl{display:block;font-size:.85vw;font-weight:400;color:var(--muted);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:.1vh}
.dc .val{display:block;font-size:2.1vw;font-weight:700}
.dc .val.lg{font-size:2.8vw}
.time{text-align:center;font-size:1vw;color:var(--muted);margin-top:.5vh}

/* footer */
.footer{position:relative;z-index:1;display:flex;align-items:center;
  justify-content:space-between;padding:.4vh 4.5vw 2.2vh;gap:2vw}
.logo-wrap{width:17vw;flex-shrink:0;line-height:0}
.logo-wrap svg{width:100%;height:auto;display:block}
.btn{background:var(--accent);color:#fff;font-family:inherit;font-size:1.2vw;
  font-weight:600;padding:.65vw 2vw;border-radius:100px;border:none;white-space:nowrap}
.web{font-size:1vw;color:var(--muted);white-space:nowrap;text-align:right}

/* ── square ─────────────────────────────── */
@media(max-aspect-ratio:1/1){
  .geo-tl{border-top:25vw solid var(--bg2);border-right:22vw solid transparent}
  .geo-br{border-bottom:28vw solid var(--bg3);border-left:25vw solid transparent}
  .main{flex-direction:column;padding:4.5vw 4.5vw 2vw;gap:2vw}
  .right{flex-direction:row;align-items:flex-start;gap:3vw;padding-top:0}
  .photo-box{max-width:26vw}
  .title{font-size:6.5vw}
  .pill{font-size:2.8vw;padding:.9vw 2.8vw}
  .pill-outline{font-size:2.3vw;padding:.7vw 2.3vw}
  .spk-name{font-size:3.5vw;text-align:left}
  .spk-role{font-size:2.6vw;text-align:left}
  .date-wrap{margin:0 4.5vw .8vw}
  .dc .lbl{font-size:2vw}
  .dc .val{font-size:4.5vw}
  .dc .val.lg{font-size:5.5vw}
  .time{font-size:2.3vw}
  .logo-wrap{width:30vw}
  .btn{font-size:2.6vw;padding:1.5vw 4.5vw}
  .web{font-size:2.2vw}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="geo-tl"></div>
  <div class="geo-br"></div>

  <div class="main">
    <div class="left">
      <span class="pill">{{ event_type }}</span>
      <h1 class="title">{{ title }}</h1>
      <div class="divider"></div>
      <span class="pill-outline">{{ pdus }}</span>
    </div>

    <div class="right">
      <div class="photo-box">
        <img src="{{ speaker_photo }}" alt="{{ speaker_name }}">
      </div>
      <div class="spk-name">{{ speaker_name }}</div>
      {% if speaker_title %}<div class="spk-role">{{ speaker_title }}</div>{% endif %}
    </div>
  </div>

  <div class="date-wrap">
    <div class="date-card">
      <div class="dc"><span class="val">{{ day_of_week }}</span></div>
      <div class="dc-sep"></div>
      <div class="dc"><span class="lbl">{{ month }}</span><span class="val lg">{{ day }}</span></div>
      <div class="dc-sep"></div>
      <div class="dc"><span class="val">{{ year }}</span></div>
    </div>
    <p class="time">{{ time }}</p>
  </div>

  <div class="footer">
    <div class="logo-wrap">{{ logo_horizontal | safe }}</div>
    <button class="btn">Register Now</button>
    <div class="web">www.pmiuae.org</div>
  </div>
</div>
</body>
</html>
